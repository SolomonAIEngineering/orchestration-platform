name: orchestration platform staging deployment

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

env:
  KUBERNETES_VERSION: 1.26.0
  HELM_CHART_PATH: helm-charts
  K8S_VERSION: "1.28.0"
  HELM_VERSION: 3.8.1
  GO_VERSION: 1.21.x

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      working-directory: .
      cluster: ${{ secrets.STAGING_CLUSTER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update

      - name: Configure Kubernetes context
        run: |
          doctl kubernetes cluster kubeconfig save --expiry-seconds 600 ${{ env.cluster }}

      - name: Check Ingress Nginx installation
        run: |
          if ! kubectl get namespace ingress-nginx &>/dev/null; then
            echo "Ingress Nginx namespace not found. Installing Ingress Nginx..."
            helm install ingress-nginx ingress-nginx/ingress-nginx \
              --namespace ingress-nginx \
              --create-namespace \
              --set controller.publishService.enabled=true
          else
            echo "Ingress Nginx namespace found. Checking for controller..."
            if ! kubectl get deployment -n ingress-nginx ingress-nginx-controller &>/dev/null; then
              echo "Ingress Nginx controller not found. Installing..."
              helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
                --namespace ingress-nginx \
                --set controller.publishService.enabled=true
            else
              echo "Ingress Nginx controller found."
            fi
          fi
          
          kubectl get pods -n ingress-nginx
          kubectl get services -n ingress-nginx

      - name: Create orchestration namespace
        run: |
          kubectl create namespace orchestration --dry-run=client -o yaml | kubectl apply -f -

      - name: Build Helm dependencies
        working-directory: ${{env.working-directory}}
        run: |
          helm dependency build ./helm-charts

      - name: Deploy To Staging Environment
        working-directory: ${{env.working-directory}}
        run: |
          helm upgrade --install trigger ./helm-charts \
            --values ./helm-charts/values.staging.yaml \
            --set solomon.database.url="${{ secrets.TRIGGER_DEV_DB_PROD_URL }}" \
            --set ingress.ingressClassName=nginx \
            --set ingress.nginx.enabled=false \
            --namespace orchestration \
            --create-namespace \
            --debug

      - name: Verify deployment
        run: |
          kubectl get pods -n orchestration
          kubectl get ingress -n orchestration
          kubectl get services -n orchestration

      - name: Check Ingress Nginx admission webhook
        run: |
          if ! kubectl get validatingwebhookconfiguration ingress-nginx-admission &>/dev/null; then
            echo "Warning: Ingress Nginx admission webhook not found. This may cause issues with Ingress validation."
          else
            echo "Ingress Nginx admission webhook found."
          fi

      - name: Display Ingress details
        run: |
          kubectl get ingress -n orchestration -o yaml